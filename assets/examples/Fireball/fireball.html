<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bola de fuego unificada — impacto instantáneo</title>
    <style>
        :root {
            --bg: #0b0d12;
            --panel: #11141d;
            --text: #f3f4f6;
            --muted: #a6acb7;
            --duration: 1100ms;
            --start-x: 16%;
            --impact-x: 80%;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at 15% 0%, rgba(51, 29, 24, .42), transparent 34%),
                radial-gradient(circle at 88% 10%, rgba(38, 16, 22, .35), transparent 30%),
                linear-gradient(180deg, #0b0d13, var(--bg));
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .app {
            width: min(1180px, 100%);
        }

        .toolbar {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(26px, 4vw, 42px);
            letter-spacing: -.035em;
            line-height: 1;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }

        button {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 12px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, .055);
            color: #fff;
            font: inherit;
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, .09);
            border-color: rgba(255, 255, 255, .25);
        }

        .card {
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .085);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .045), rgba(255, 255, 255, .018));
            box-shadow: 0 24px 65px rgba(0, 0, 0, .45), inset 0 1px rgba(255, 255, 255, .04);
        }

        .scene {
            position: relative;
            height: min(440px, 62vw);
            min-height: 320px;
            overflow: hidden;
            isolation: isolate;
            cursor: pointer;
            background:
                radial-gradient(ellipse at 50% 92%, rgba(143, 82, 48, .12), transparent 48%),
                radial-gradient(circle at 80% 50%, rgba(78, 13, 5, .1), transparent 23%),
                linear-gradient(180deg, #121620 0%, #090b10 68%, #06070a 100%);
        }

        .world,
        .screen-flash,
        .vignette {
            position: absolute;
            inset: 0;
        }

        .world {
            z-index: 1;
        }

        .screen-flash {
            z-index: 20;
            pointer-events: none;
            opacity: 0;
        }

        .vignette {
            z-index: 21;
            pointer-events: none;
            background: radial-gradient(circle at 52% 48%, transparent 38%, rgba(0, 0, 0, .56) 100%);
        }

        .scene.play .world {
            animation: screen-shake var(--duration) linear both;
        }

        .ground {
            position: absolute;
            left: -10%;
            right: -10%;
            bottom: -17%;
            height: 43%;
            border-radius: 50%;
            background:
                radial-gradient(ellipse, rgba(181, 88, 39, .11), transparent 55%),
                radial-gradient(ellipse, rgba(255, 255, 255, .035), transparent 70%);
            transform: perspective(560px) rotateX(64deg);
        }

        .ground-line {
            position: absolute;
            left: 4%;
            right: 4%;
            top: 68%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .075), transparent);
        }

        .ground-light {
            position: absolute;
            left: var(--impact-x);
            top: 66%;
            width: 270px;
            height: 76px;
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%) scale(.05);
            filter: blur(18px);
            background: radial-gradient(ellipse, rgba(255, 76, 6, .9), rgba(160, 17, 2, .3) 42%, transparent 72%);
        }

        .scene.play .ground-light {
            animation: ground-flash var(--duration) linear both;
        }

        /* Casteo */
        .charge {
            position: absolute;
            left: var(--start-x);
            top: 50%;
            width: 142px;
            height: 142px;
            z-index: 4;
            transform: translate(-50%, -50%);
        }

        .charge-glow {
            position: absolute;
            inset: 22px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.45) 0 10%, rgba(255, 202, 90, 0.8) 20%, rgba(255, 60, 0, 0.18) 44%, transparent 72%);
            filter: blur(7px);
            opacity: 0;
            transform: scale(0);
        }

        .charge-distortion {
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(255, 210, 130, 0.40);
            border-radius: 47% 53% 42% 58% / 56% 43% 57% 44%;
            filter: blur(0.7px);
            opacity: 0;
            transform: scale(0.7);
        }

        .charge-arc {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            opacity: 1;
            pointer-events: none;
        }

        .charge-arc::before,
        .charge-arc::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border-top: 2px solid rgba(255, 220, 135, 0.65);
            border-right: 1px solid rgba(255, 160, 70, 0.28);
            border-left: 0;
            border-bottom: 0;
            filter: blur(0.3px);
        }

        .charge-arc::before {
            transform: rotate(15deg) scale(1.02);
        }

        .charge-arc::after {
            transform: rotate(205deg) scale(0.88);
            opacity: 0.7;
        }

        .charge-particle {
            --a: 0deg;
            --r: 38px;
            --s: 4px;
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--s);
            height: var(--s);
            border-radius: 50%;
            background: rgba(255, 225, 145, 0.95);
            box-shadow: 0 0 8px rgba(255, 175, 60, 0.85), 0 0 14px rgba(255, 65, 0, 0.45);
            opacity: 0;
        }

        .scene.play .charge-glow {
            animation: charge-glow var(--duration) ease-out both;
        }

        .scene.play .charge-distortion {
            animation: charge-distortion var(--duration) ease-out both;
        }

        .scene.play .charge-arc {
            animation: charge-arc-spin var(--duration) linear both;
        }

        .scene.play .charge-particle {
            animation: charge-particle var(--duration) ease-in both;
        }

        /* Proyectil y trail unido: desaparecen exactamente en el impacto */
        .fireball {
            position: absolute;
            left: var(--start-x);
            top: 50%;
            width: 124px;
            height: 78px;
            z-index: 10;
            opacity: 0;
            transform: translate(-50%, -50%) scale(.05);
            will-change: left, transform, opacity;
            filter: drop-shadow(0 0 8px rgba(255, 237, 184, .52)) drop-shadow(0 0 20px rgba(203, 33, 1, .56));
        }

        .scene.play .fireball {
            animation: fireball-flight var(--duration) ease-in both;
        }

        .trail {
            position: absolute;
            right: 48px;
            top: 50%;
            width: 210px;
            height: 64px;
            transform: translateY(-50%);
            transform-origin: right center;
            z-index: 0;
        }

        .trail-ribbon,
        .trail-streak {
            position: absolute;
            right: 0;
            top: 50%;
            opacity: 0;
            transform-origin: right center;
            mix-blend-mode: screen;
        }

        .trail-ribbon {
            width: var(--w);
            height: var(--h);
            border-radius: 88% 14% 24% 88% / 66% 38% 62% 34%;
            transform: translateY(calc(-50% + var(--y))) rotate(var(--r)) scaleX(.02);
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(20, 0, 3, .86) 12%,
                    rgba(96, 5, 3, .88) 33%,
                    rgba(215, 37, 2, .96) 64%,
                    rgba(255, 142, 44, .98) 84%,
                    rgba(255, 239, 188, .9) 95%,
                    transparent 100%);
            filter: blur(var(--blur));
        }

        .trail-ribbon::before {
            content: "";
            position: absolute;
            inset: 24% 0;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, rgba(255, 52, 4, .2) 22%, rgba(255, 171, 66, .74) 68%, #fff4d9 92%, transparent);
            filter: blur(1px);
            animation: filament 70ms ease-in-out infinite alternate;
        }

        .trail-streak {
            width: var(--w);
            height: var(--h);
            transform: translateY(calc(-50% + var(--y))) rotate(var(--r)) scaleX(.02);
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(255, 45, 2, .75) 48%, rgba(255, 213, 125, .98) 88%, transparent);
            box-shadow: 0 0 7px rgba(255, 53, 4, .5);
            filter: blur(var(--blur));
        }

        .scene.play .trail-ribbon,
        .scene.play .trail-streak {
            animation: attached-trail var(--duration) linear both;
        }

        .fireball-body {
            position: absolute;
            right: 0;
            top: 50%;
            width: 72px;
            height: 58px;
            transform: translateY(-50%);
            isolation: isolate;
            z-index: 3;
        }

        .ball-outer,
        .ball-mid,
        .ball-core,
        .ball-hotspot,
        .ball-shadow {
            position: absolute;
            pointer-events: none;
        }

        .ball-outer {
            inset: 0;
            border-radius: 43% 57% 52% 48% / 59% 42% 58% 41%;
            background: radial-gradient(circle at 66% 46%,
                    #fff9e6 0 5%,
                    #ffc267 12%,
                    #f9550d 31%,
                    #a71404 48%,
                    #390006 63%,
                    rgba(0, 0, 0, .76) 73%,
                    transparent 84%);
            filter: blur(1.8px);
            animation: blob-one 85ms ease-in-out infinite alternate, outer-flicker 65ms ease-in-out infinite alternate;
        }

        .ball-mid {
            inset: 5px 6px 6px 9px;
            border-radius: 56% 44% 47% 53% / 45% 59% 41% 55%;
            background: radial-gradient(circle at 63% 46%, #fff 0 5%, #ffd38b 15%, #ff721b 37%, rgba(116, 9, 1, .74) 68%, transparent 82%);
            filter: blur(1px);
            mix-blend-mode: screen;
            animation: blob-two 65ms ease-in-out infinite alternate, mid-flicker 58ms ease-in-out infinite alternate;
        }

        .ball-core {
            inset: 13px 13px 13px 21px;
            border-radius: 49% 51% 42% 58% / 58% 44% 56% 42%;
            background: radial-gradient(circle at 62% 46%, #fff 0 18%, #fff0c9 36%, #ffb04e 66%, rgba(255, 63, 7, .12) 100%);
            filter: blur(.65px);
            mix-blend-mode: screen;
            animation: blob-three 55ms ease-in-out infinite alternate, core-pulse 72ms ease-in-out infinite alternate;
        }

        .ball-hotspot {
            inset: 18px 14px 18px 30px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0 45%, rgba(255, 245, 216, .72) 70%, transparent);
            filter: blur(2.5px);
            animation: hotspot 46ms ease-in-out infinite alternate;
        }

        .ball-shadow {
            inset: -4px;
            border-radius: 50%;
            background: repeating-linear-gradient(145deg, rgba(0, 0, 0, .11) 0 3px, rgba(255, 255, 255, .025) 3px 6px);
            mix-blend-mode: multiply;
            opacity: .55;
        }

        /* Partículas que se quedan sobre el recorrido, con vida muy corta */
        .trace-layer {
            position: absolute;
            inset: 0;
            z-index: 7;
            pointer-events: none;
        }

        .trace-particle {
            --life: 180ms;
            --dx: -24px;
            --dy: 0px;
            position: absolute;
            width: var(--size);
            height: var(--size);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            box-shadow: 0 0 calc(var(--size) * 1.5) #ffcf83, 0 0 calc(var(--size) * 3) #ff3b00, 0 0 calc(var(--size) * 6) #a11100;
            mix-blend-mode: screen;
            animation: trace-life var(--life) ease-out forwards;
        }

        /* Impacto combinado: radial + implosión + cono + napalm */
        .impact {
            position: absolute;
            left: var(--impact-x);
            top: 50%;
            width: 1px;
            height: 1px;
            z-index: 13;
            pointer-events: none;
        }

        .impact-core {
            position: absolute;
            left: 0;
            top: 0;
            width: 174px;
            height: 174px;
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%) scale(.02);
            background: radial-gradient(circle,
                    #fff 0 4%,
                    #fff4d0 8%,
                    #ffc066 19%,
                    #ff6317 36%,
                    rgba(182, 19, 1, .88) 54%,
                    rgba(25, 0, 4, .75) 69%,
                    transparent 82%);
            filter: blur(4px) drop-shadow(0 0 28px rgba(255, 86, 12, .6)) drop-shadow(0 0 62px rgba(185, 16, 0, .3));
            mix-blend-mode: screen;
        }

        .void-disc {
            position: absolute;
            left: 0;
            top: 0;
            width: 156px;
            height: 156px;
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.5);
            background: radial-gradient(circle, #000 0 34%, rgba(42, 0, 5, .98) 48%, rgba(230, 32, 3, .9) 62%, rgba(255, 142, 55, .45) 68%, transparent 77%);
            box-shadow: 0 0 0 3px rgba(255, 91, 35, .6), 0 0 56px rgba(184, 11, 0, .66);
            filter: blur(1px);
        }

        .blast-petal {
            --a: 0deg;
            --d: 100px;
            --scale: 1;
            position: absolute;
            left: 0;
            top: 0;
            width: 118px;
            height: 40px;
            opacity: 0;
            border-radius: 96% 20% 42% 96% / 61% 31% 69% 39%;
            transform-origin: left center;
            transform: rotate(var(--a)) translateX(0) scaleX(.02) scaleY(.2);
            background: linear-gradient(90deg, #fff8df 0, #ffb04b 20%, #ee4307 47%, #7d0503 70%, transparent 100%);
            filter: blur(3.2px) drop-shadow(0 0 14px rgba(255, 61, 4, .55));
        }

        .shock-ring {
            position: absolute;
            left: 0;
            top: 0;
            width: var(--size);
            height: var(--size);
            border: var(--border-size) solid rgba(255, 155, 72, .76);
            border-radius: 52% 48% 56% 44% / 47% 61% 39% 53%;
            opacity: 0;
            transform: translate(-50%, -50%) scale(.02);
            box-shadow: 0 0 14px rgba(255, 52, 2, .35), inset 0 0 10px rgba(255, 78, 3, .2);
            filter: blur(var(--ring-blur));
        }

        .blast-cone {
            position: absolute;
            left: 5px;
            top: 0;
            width: 260px;
            height: 120px;
            opacity: 0;
            transform-origin: left center;
            transform: translateY(-50%) scaleX(.01) scaleY(.12);
            clip-path: polygon(0 42%, 100% 0, 86% 50%, 100% 100%, 0 58%);
            background: linear-gradient(90deg, rgba(255, 250, 230, .98), rgba(255, 125, 37, .86) 28%, rgba(203, 34, 3, .56) 58%, transparent);
            filter: blur(8px) drop-shadow(0 0 18px rgba(255, 61, 4, .45));
        }

        .blast-cone.thin {
            height: 54px;
            width: 315px;
            filter: blur(3px);
            background: linear-gradient(90deg, #fff, #ffc26b 18%, #f04a08 46%, transparent 90%);
        }

        .backblast {
            position: absolute;
            right: 3px;
            top: 0;
            width: 150px;
            height: 78px;
            opacity: 0;
            transform-origin: right center;
            transform: translateY(-50%) scaleX(.01) scaleY(.2);
            clip-path: polygon(100% 40%, 0 0, 14% 50%, 0 100%, 100% 60%);
            background: linear-gradient(270deg, rgba(255, 231, 179, .9), rgba(255, 83, 13, .68) 42%, transparent);
            filter: blur(6px);
        }

        .blast-pool {
            position: absolute;
            left: 0;
            top: 67px;
            width: 300px;
            height: 66px;
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%) scale(.01);
            background: radial-gradient(ellipse, #fff0b7 0 7%, #ff8a20 22%, #e13704 44%, #650205 66%, transparent 78%);
            filter: blur(6px) drop-shadow(0 0 20px rgba(255, 51, 2, .35));
        }

        .blast-jet {
            position: absolute;
            left: var(--x);
            top: 44px;
            width: var(--w);
            height: var(--h);
            border-radius: 55% 45% 28% 72% / 83% 35% 65% 17%;
            opacity: 0;
            transform-origin: center bottom;
            transform: translate(-50%, -100%) rotate(var(--r)) scaleY(.02) scaleX(.35);
            background: linear-gradient(180deg, transparent 0, rgba(255, 81, 8, .28) 15%, #ff5a08 52%, #ffd18b 88%, #fff 100%);
            filter: blur(5px) drop-shadow(0 0 14px rgba(255, 51, 3, .5));
        }


        .debris {
            --a: 0deg;
            --d: 80px;
            --rot: 180deg;
            --size: 6px;
            position: absolute;
            left: 0;
            top: 0;
            width: var(--size);
            height: var(--size);
            border-radius: 42%;
            opacity: 0;
            background: linear-gradient(135deg, #6b3a27, #24100d);
            box-shadow: 0 0 4px rgba(255, 75, 8, .4);
            transform: translate(-50%, -50%);
        }

        .impact-smoke {
            --x: 0px;
            --y: -40px;
            --s: 1;
            --drift: 0px;
            position: absolute;
            left: 0;
            top: 0;
            width: 88px;
            height: 70px;
            border-radius: 50%;
            opacity: 0;
            transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(.1);
            background: radial-gradient(circle at 50% 62%, rgba(117, 30, 17, .62), rgba(35, 14, 16, .78) 44%, rgba(9, 7, 10, .44) 68%, transparent 78%);
            filter: blur(12px);
        }

        .impact-fire {
            position: absolute;
            left: 0;
            top: 0;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%) scale(.1);
            background: radial-gradient(circle, #fff 0 2%, #ffd27f 8%, #ff4b0f 25%, rgba(120, 10, 0, .8) 50%, transparent 75%);
            filter: blur(8px);
            mix-blend-mode: screen;
        }

        .scene.play .impact-core {
            animation: impact-core var(--duration) linear both;
        }

        .scene.play .impact-fire {
            animation: impact-fire var(--duration) linear both;
        }

        .scene.play .void-disc {
            animation: void-implosion var(--duration) linear both;
        }

        .scene.play .blast-petal {
            animation: petal-burst var(--duration) linear both;
        }

        .scene.play .shock-ring.one {
            animation: ring-one var(--duration) linear both;
        }

        .scene.play .shock-ring.two {
            animation: ring-two var(--duration) linear both;
        }

        .scene.play .blast-cone {
            animation: forward-cone var(--duration) linear both;
        }

        .scene.play .backblast {
            animation: backblast var(--duration) linear both;
        }

        .scene.play .blast-pool {
            animation: pool-spread var(--duration) linear both;
        }

        .scene.play .blast-jet {
            animation: jet-rise var(--duration) linear both;
        }

        .scene.play .spark {
            animation: spark-burst var(--duration) linear both;
        }

        .scene.play .debris {
            animation: debris-burst var(--duration) linear both;
        }

        .scene.play .impact-smoke {
            animation: smoke-rise var(--duration) linear both;
        }

        .scene.play .screen-flash {
            animation: screen-flash var(--duration) linear both;
        }

        .timeline-note {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 13px 16px;
            border-top: 1px solid rgba(255, 255, 255, .06);
            color: var(--muted);
            font-size: 13px;
        }

        .pill {
            padding: 5px 9px;
            border: 1px solid rgba(255, 255, 255, .09);
            border-radius: 999px;
            background: rgba(255, 255, 255, .035);
        }

        @keyframes charge-glow {
            0% {
                opacity: 0;
                transform: scale(.05);
            }

            5% {
                opacity: .85;
                transform: scale(.55);
            }

            13% {
                opacity: 1;
                transform: scale(1.18);
            }

            18% {
                opacity: .92;
                transform: scale(.88);
            }

            20% {
                opacity: 0;
                transform: scale(.2);
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes charge-distortion {
            0% {
                opacity: 0;
                transform: scale(0.7) rotate(0);
            }

            5% {
                opacity: 0.65;
            }

            17% {
                opacity: 1;
                transform: scale(1.08) rotate(180deg);
            }

            20% {
                opacity: 0;
                transform: scale(0.25) rotate(220deg);
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes charge-arc-spin {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(0);
            }

            5% {
                opacity: 0.8;
            }

            18% {
                opacity: 1;
                transform: scale(1) rotate(240deg);
            }

            20% {
                opacity: 0;
                transform: scale(0.2) rotate(280deg);
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes charge-particle {

            0%,
            2% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--a)) translateX(var(--r)) scale(0.1);
            }

            8% {
                opacity: 1;
            }

            18% {
                opacity: 0.95;
                transform: translate(-50%, -50%) rotate(calc(var(--a) + 140deg)) translateX(12px) scale(1.2);
            }

            20% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.1);
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes fireball-flight {
            0% {
                left: var(--start-x);
                opacity: 0;
                transform: translate(-50%, -50%) scale(.04);
            }

            5% {
                opacity: .45;
                transform: translate(-50%, -50%) scale(.22);
            }

            13% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(.82);
            }

            18% {
                left: var(--start-x);
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            20% {
                left: var(--start-x);
                transform: translate(-50%, -50%) scaleX(1.18) scaleY(.88);
            }

            34% {
                transform: translate(-50%, -58%) rotate(-1.8deg) scaleX(1.34) scaleY(.78);
            }

            48% {
                transform: translate(-50%, -44%) rotate(1.4deg) scaleX(1.3) scaleY(.8);
            }

            57.95% {
                left: var(--impact-x);
                opacity: 1;

<body>
    <main class="app">
        <audio id="fireballSound" preload="auto"></audio>
        <audio id="impactSound" src="sounds/hit_1.wav" preload="auto"></audio>

        <div class="toolbar">
            <div>
                <h1>Impacto infernal unificado</h1>
                <p class="subtitle">Casteo rápido → vuelo continuo → impacto y explosión en el mismo frame.</p>
            </div>
            <button id="replay" type="button">Reproducir</button>
        </div>

        <article class="card">
            <div class="scene play" id="scene" aria-label="Animación de bola de fuego. Haz clic para repetir.">
                <div class="world">
                    <div class="ground"></div>
                    <div class="ground-line"></div>
                    <div class="ground-light"></div>

                    <div class="charge">
                        <div class="charge-glow"></div>
                        <div class="charge-distortion"></div>
                        <div class="charge-arc"></div>
                        <i class="charge-particle" style="--a:12deg;--r:42px;--s:3px"></i>
                        <i class="charge-particle" style="--a:86deg;--r:33px;--s:3px"></i>
                        <i class="charge-particle" style="--a:155deg;--r:45px;--s:5px"></i>
                        <i class="charge-particle" style="--a:228deg;--r:36px;--s:3px"></i>
                        <i class="charge-particle" style="--a:307deg;--r:40px;--s:4px"></i>
                    </div>

                    <div class="trace-layer" id="traceLayer"></div>

                    <div class="fireball" id="fireball">
                        <div class="trail">
                            <i class="trail-ribbon" style="--w:140px;--h:34px;--y:0px;--r:0deg;--blur:4px;--o:.92"></i>
                            <i class="trail-ribbon"
                                style="--w:115px;--h:16px;--y:-18px;--r:-7deg;--blur:2px;--o:.92"></i>
                            <i class="trail-ribbon" style="--w:105px;--h:14px;--y:17px;--r:8deg;--blur:2px;--o:.88"></i>
                            <i class="trail-streak" style="--w:160px;--h:5px;--y:-6px;--r:-1deg;--blur:1px;--o:.95"></i>
                            <i class="trail-streak" style="--w:130px;--h:3px;--y:11px;--r:2deg;--blur:.4px;--o:1"></i>
                        </div>
                        <div class="fireball-body">
                            <div class="ball-outer"></div>
                            <div class="ball-mid"></div>
                            <div class="ball-core"></div>
                            <div class="ball-hotspot"></div>
                            <div class="ball-shadow"></div>
                        </div>
                    </div>

                    <div class="impact">
                        <div class="void-disc"></div>
                        <div class="impact-core"></div>
                        <div class="shock-ring one" style="--size:112px;--border-size:7px;--ring-blur:1px"></div>
                        <div class="shock-ring two" style="--size:92px;--border-size:3px;--ring-blur:2px"></div>

                        <div class="impact-fire"></div>


                        <i class="impact-smoke"
                            style="--x:-82px;--y:-20px;--s:0.8;--drift:-26px;--s2:1.080;--s3:1.376;--drift2:-39.0px"></i>
                        <i class="impact-smoke"
                            style="--x:-44px;--y:-58px;--s:1.0;--drift:-14px;--s2:1.350;--s3:1.720;--drift2:-21.0px"></i>
                        <i class="impact-smoke"
                            style="--x:0px;--y:-74px;--s:1.15;--drift:8px;--s2:1.552;--s3:1.978;--drift2:12.0px"></i>
                        <i class="impact-smoke"
                            style="--x:46px;--y:-52px;--s:0.96;--drift:18px;--s2:1.296;--s3:1.651;--drift2:27.0px"></i>
                        <i class="impact-smoke"
                            style="--x:84px;--y:-16px;--s:0.78;--drift:28px;--s2:1.053;--s3:1.342;--drift2:42.0px"></i>

                            style="--x:-18px;--y:-28px;--s:0.72;--drift:-4px;--s2:0.972;--s3:1.238;--drift2:-6.0px"></i>
                    </div>

                <div class="screen-flash"></div>

                <span class="pill">casteo 0–20%</span>
                <span class="pill">vuelo 20–58%</span>
                <span class="pill">impacto exacto 58%</span>
                <span class="pill">trail dinámico ≤ 200 ms</span>

    <script>
        const scene = document.getElementById("scene");
        const replayButton = document.getElementById("replay");
        const fireball = document.getElementById("fireball");
        const traceLayer = document.getElementById("traceLayer");

        const DURATION = 1500;
        const FLIGHT_START = DURATION * 0.20;
        const IMPACT_AT = DURATION * 0.58;

        let animationFrame = 0;
        let replayToken = 0;
        let lastSpawn = 0;

        function clearTrace() {
            traceLayer.replaceChildren();
        }

        function spawnTraceParticle() {
            const sceneRect = scene.getBoundingClientRect();
            const ballRect = fireball.getBoundingClientRect();

            const particle = document.createElement("i");
            particle.className = "trace-particle";

            const size = 1.5 + Math.random() * 3.5;
            const life = 250 + Math.random() * 450;
            const x = ballRect.left - sceneRect.left + ballRect.width * (0.12 + Math.random() * 0.25);
            const y = ballRect.top - sceneRect.top + ballRect.height * (0.34 + Math.random() * 0.32);

            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            particle.style.setProperty("--size", `${size}px`);
            particle.style.setProperty("--life", `${life}ms`);
            particle.style.setProperty("--dx", `${-30 - Math.random() * 80}px`);
            particle.style.setProperty("--dy", `${-10 + Math.random() * 60}px`);

            traceLayer.appendChild(particle);
            particle.addEventListener("animationend", () => particle.remove(), { once: true });
        }

        function spawnImpactEmber() {
            const sceneRect = scene.getBoundingClientRect();
            const impactCore = document.querySelector(".impact-core");
            const impactRect = impactCore.getBoundingClientRect();

            const particle = document.createElement("i");
            particle.className = "trace-particle";

            const size = 1.5 + Math.random() * 4.5;
            const life = 350 + Math.random() * 450;

            const x = impactRect.left - sceneRect.left + impactRect.width / 2;
            const y = impactRect.top - sceneRect.top + impactRect.height / 2;

            const angle = Math.random() * Math.PI * 2;
            const dist = 60 + Math.random() * 120;

            const dx = Math.cos(angle) * dist;
            const dy = Math.sin(angle) * dist;

            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            particle.style.setProperty("--size", `${size}px`);
            particle.style.setProperty("--life", `${life}ms`);
            particle.style.setProperty("--dx", `${dx}px`);
            particle.style.setProperty("--dy", `${dy}px`);

            traceLayer.appendChild(particle);
            particle.addEventListener("animationend", () => particle.remove(), { once: true });
        }

        function animateTrace(startTime, token) {
            let impactSpawned = false;
            let soundPlayed = false;
            const tick = (now) => {
                if (token !== replayToken || !scene.classList.contains("play")) return;

                const elapsed = now - startTime;

                if (elapsed >= IMPACT_AT - 320 && !soundPlayed) {
                    soundPlayed = true;
                    const impactSound = document.getElementById("impactSound");
                    const hitFiles = ["sounds/hit_1.wav", "sounds/hit_2.wav"];
                    impactSound.src = hitFiles[Math.floor(Math.random() * hitFiles.length)];
                    impactSound.currentTime = 0;
                    impactSound.play().catch(e => console.log("Audio playback prevented:", e));
                }

                if (elapsed >= IMPACT_AT - 200) {
                    if (!impactSpawned) {
                        impactSpawned = true;
                        for (let i = 0; i < 28; i++) {
                            spawnImpactEmber();
                        }
                    }
                    return;
                }

                if (elapsed >= FLIGHT_START && now - lastSpawn > 12) {
                    spawnTraceParticle();
                    if (Math.random() > 0.3) spawnTraceParticle();
                    if (Math.random() > 0.6) spawnTraceParticle();
                    lastSpawn = now;
                }

                animationFrame = requestAnimationFrame(tick);
            };

            animationFrame = requestAnimationFrame(tick);
        }

        function replay() {
            replayToken += 1;
            const token = replayToken;

            cancelAnimationFrame(animationFrame);
            clearTrace();
            scene.classList.remove("play");
            void scene.offsetWidth;
            scene.classList.add("play");

            const fireballSound = document.getElementById("fireballSound");
            const soundFiles = [
                "sounds/Fireball 1.wav",
                "sounds/Fireball 2.wav",
                "sounds/Fireball 3.wav"
            ];
            fireballSound.src = soundFiles[Math.floor(Math.random() * soundFiles.length)];
            fireballSound.currentTime = 0;
            fireballSound.play().catch(e => console.log("Audio playback prevented:", e));

            lastSpawn = 0;
            animateTrace(performance.now(), token);
        }

        replayButton.addEventListener("click", (event) => {
            event.stopPropagation();
            replay();
        });

        scene.addEventListener("click", replay);
        window.addEventListener("load", replay);
